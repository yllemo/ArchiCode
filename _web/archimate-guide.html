<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArchiMate 4 — Interaktiv Referensguide</title>
  <link rel="stylesheet" href="../archicode.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --motivation:   #D8C1E4; --motivation-b:   #B39BCF;
      --strategy:     #EFBD5D; --strategy-b:     #D4A43B;
      --common:       #E8E5D3; --common-b:       #C4BFA6;
      --business:     #F4DE7F; --business-b:     #E8C555;
      --application:  #B6D7E1; --application-b:  #8CC5D4;
      --technology:   #C3E1B4; --technology-b:   #9BD083;
      --implementation: #F8C2BE; --implementation-b: #F09B95;

      --sidebar-bg: #1e2130;
      --sidebar-text: #e2e8f0;
      --sidebar-muted: #8892a4;
      --sidebar-border: rgba(255,255,255,0.07);
      --sidebar-hover: rgba(255,255,255,0.06);
      --sidebar-active: rgba(255,255,255,0.12);
      --panel-bg: #f5f6f8;
      --surface: #ffffff;
      --text: #1a1c2e;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --radius: 10px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --accent: #4f7cff;
    }

    html, body { height: 100%; }

    body {
      font-family: Arial, system-ui, -apple-system, sans-serif;
      background: var(--sidebar-bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ── TOP NAV ── */
    .top-nav {
      background: #151724;
      border-bottom: 1px solid var(--sidebar-border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      height: 52px;
      flex-shrink: 0;
      z-index: 50;
    }
    .top-nav .logo {
      font-size: 1rem;
      font-weight: 800;
      color: #EFBD5D;
      white-space: nowrap;
      letter-spacing: -0.3px;
    }
    .top-nav .logo span { color: var(--sidebar-muted); font-weight: 400; font-size: 0.85rem; }
    .top-nav-links {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }
    .top-nav-links a {
      color: var(--sidebar-muted);
      text-decoration: none;
      font-size: 0.82rem;
      padding: 5px 10px;
      border-radius: 6px;
      transition: all 0.15s;
    }
    .top-nav-links a:hover { background: var(--sidebar-hover); color: var(--sidebar-text); }

    /* ── APP LAYOUT ── */
    .app {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      overflow-y: auto;
      padding: 16px 0 24px;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .sidebar-section { margin-bottom: 6px; }

    .sidebar-domain-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px 6px;
    }
    .domain-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sidebar-domain-header span {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--sidebar-muted);
    }

    .sidebar-item {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      padding: 7px 16px 7px 34px;
      font-family: inherit;
      font-size: 0.82rem;
      color: var(--sidebar-muted);
      cursor: pointer;
      border-radius: 0;
      transition: all 0.15s;
      position: relative;
    }
    .sidebar-item:hover {
      background: var(--sidebar-hover);
      color: var(--sidebar-text);
    }
    .sidebar-item.active {
      background: var(--sidebar-active);
      color: white;
      font-weight: 600;
    }
    .sidebar-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 4px; bottom: 4px;
      width: 3px;
      border-radius: 0 2px 2px 0;
      background: var(--accent);
    }

    .sidebar-divider {
      height: 1px;
      background: var(--sidebar-border);
      margin: 8px 16px;
    }

    /* ── MAIN PANEL ── */
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--panel-bg);
      overflow: hidden;
    }

    /* ── PANEL HEADER ── */
    .panel-header {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
    }
    .panel-header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 3px;
    }
    .panel-header .domain-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 100px;
      border: 1.5px solid;
    }
    .panel-header p.desc {
      margin-top: 8px;
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* ── PANEL BODY ── */
    .panel-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 20px 24px;
      gap: 20px;
    }

    /* ── DIAGRAM CARD ── */
    .diagram-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .diagram-card-header {
      padding: 10px 16px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .diagram-output {
      padding: 24px;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: auto;
    }
    .diagram-output svg { max-width: 100%; }

    /* ── CODE CARD ── */
    .code-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .code-card-header {
      padding: 10px 16px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: #fafafa;
    }
    pre.code-block {
      padding: 16px;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      color: #374151;
      overflow-x: auto;
      white-space: pre;
      background: transparent;
    }
    pre.code-block .c  { color: #9ca3af; } /* comment */
    pre.code-block .el { color: #0277BD; } /* element */
    pre.code-block .tp { color: #7c3aed; } /* type */
    pre.code-block .nm { color: #1a1c2e; } /* name */
    pre.code-block .ar { color: #b45309; } /* arrow */

    /* ── RELATION TABLE ── */
    .relation-section { margin-top: 4px; }
    .relation-section h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--text);
    }
    .rel-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      font-size: 0.83rem;
    }
    .rel-table thead th {
      background: #1e2130;
      color: white;
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      font-size: 0.78rem;
    }
    .rel-table tbody td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .rel-table tbody tr:last-child td { border-bottom: none; }
    .rel-table tbody tr:hover { background: #f9fafb; }
    .rel-table code {
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 0.82rem;
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 4px;
      color: #374151;
    }
    .rel-mini { width: 100%; min-width: 120px; }
    .rel-mini svg { max-width: 180px; }

    /* ── WELCOME PANEL ── */
    .welcome-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }
    .welcome-panel .icon { font-size: 3rem; opacity: 0.3; }
    .welcome-panel p { max-width: 320px; font-size: 0.9rem; line-height: 1.6; }

    /* ── ELEMENT TAGS ── */
    .element-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 4px;
    }
    .epill {
      font-size: 0.72rem;
      font-family: monospace;
      padding: 2px 8px;
      border-radius: 100px;
      background: rgba(0,0,0,0.06);
      border: 1px solid rgba(0,0,0,0.1);
      color: #374151;
    }

    @media (max-width: 640px) {
      .sidebar { width: 200px; }
      .panel-body { padding: 14px; }
    }
    @media (max-width: 480px) {
      .app { flex-direction: column; }
      .sidebar { width: 100%; height: 200px; overflow-x: auto; overflow-y: hidden; border-right: none; border-bottom: 1px solid var(--sidebar-border); }
      .sidebar-domain-header, .sidebar-item { display: inline-block; vertical-align: top; white-space: nowrap; }
    }
  </style>
</head>

// ── RENDER ───────────────────────────────────────────────────────────────────
function showExample(btn) {
  const key = btn.dataset.key;
  const ex = EXAMPLES[key];
  if (!ex) return;

  // Update sidebar active state
  document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Show header
  const header = document.getElementById('panel-header');
  header.style.display = 'block';
  document.getElementById('ph-title').textContent = ex.title;
  const badge = document.getElementById('ph-badge');
  badge.textContent = ex.badge;
  badge.style.background = ex.badgeColor;
  badge.style.borderColor = ex.badgeBorder;
  badge.style.color = '#1a1c2e';

  const pills = document.getElementById('ph-pills');
  pills.innerHTML = ex.pills.map(p => `<span class="epill">${p}</span>`).join('');

  document.getElementById('ph-desc').textContent = ex.desc;

  // Build body
  const body = document.getElementById('panel-body');

  if (key === 'relations-all') {
    // Special: render relation table
    body.innerHTML = buildRelationTable();
    renderAllRelationMinis();
  } else {
    body.innerHTML = `
      <div class="diagram-card">
        <div class="diagram-card-header">
          <span>Live-renderat diagram</span>
          <span style="font-weight:400; text-transform:none; letter-spacing:0; color:#9ca3af; font-size:0.75rem;">ArchiCode.render()</span>
        </div>
        <div class="diagram-output" id="diagram-out"></div>
      </div>
      <div class="code-card">
        <div class="code-card-header">ArchiCode-syntax</div>
        <pre class="code-block">${escHtml(ex.code)}</pre>
      </div>
    `;
    // Render
    try {
      ArchiCode.render(ex.code, '#diagram-out');
    } catch(e) {
      document.getElementById('diagram-out').innerHTML = `<span style="color:#e57373;font-size:0.85rem;">Renderingsfel: ${escHtml(e.message)}</span>`;
    }
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── RELATION TABLE ────────────────────────────────────────────────────────────
const RELATIONS = [
  { syntax: '->', name: 'Serving', desc: 'Element A levererar tjänst till element B.', code: '[<common:service> Tjänst] -> [<application:component> Klient]' },
  { syntax: '-->', name: 'Flow', desc: 'Information eller data flödar från A till B.', code: '[<common:process> Process A] --> [<common:process> Process B]' },
  { syntax: '--:>', name: 'Realization', desc: 'A realiserar (implementerar) B.', code: '[<application:component> Webbapp] --:> [<business:service> Onlineköp]' },
  { syntax: '-|>', name: 'Triggering', desc: 'A triggar (startar) B.', code: '[<common:event> Betalning] -|> [<common:process> Leverans]' },
  { syntax: '.--', name: 'Assignment', desc: 'A är tilldelad till roll/element B.', code: '[<business:actor> Kund] .-- [<business:role> Köpare]' },
  { syntax: 'o-', name: 'Aggregation', desc: 'B är en del av A (lös sammansättning).', code: '[<business:product> Paket] o- [<common:service> Support]' },
  { syntax: '-:>', name: 'Specialization', desc: 'A är en specialisering av B.', code: '[<business:actor> VIP-kund] -:> [<business:actor> Kund]' },
  { syntax: '---', name: 'Association', desc: 'Generell, odefinierbar relation.', code: '[<business:actor> Chef] --- [<common:process> Beslutsprocess]' },
  { syntax: '<->', name: 'Access', desc: 'A använder/accessar (läser/skriver) B.', code: '[<application:component> Service] <-> [<application:data> Databas]' },
];

function buildRelationTable() {
  return `
    <div class="relation-section">
      <table class="rel-table">
        <thead>
          <tr>
            <th>Syntax</th>
            <th>Relation</th>
            <th>Beskrivning</th>
            <th style="min-width:160px;">Exempel (live)</th>
          </tr>
        </thead>
        <tbody>
          ${RELATIONS.map((r,i) => `
          <tr>
            <td><code>${escHtml(r.syntax)}</code></td>
            <td><strong>${r.name}</strong></td>
            <td style="color:#6b7280;font-size:0.8rem;">${r.desc}</td>
            <td><div class="rel-mini" id="rel-mini-${i}"></div></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderAllRelationMinis() {
  RELATIONS.forEach((r,i) => {
    const el = document.getElementById('rel-mini-' + i);
    if (!el) return;
    try {
      ArchiCode.render(r.code, el);
      // Scale down SVG
      const svg = el.querySelector('svg');
      if (svg) {
        svg.style.maxWidth = '200px';
        svg.style.fontSize = '11px';
      }
    } catch(e) { /* skip */ }
  });
}
